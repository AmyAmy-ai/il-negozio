<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Il negozio 🛍️</title>
  <style>
    :root {
      --bg: #05070b;
      --panel: #0c1016;
      --panel-soft: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.1);
      --text: #ffffff;
      --muted: #94a3b8;
      --muted-2: #64748b;
      --accent: #ffffff;
      --accent-text: #000000;
      --blue-soft: rgba(99,102,241,0.12);
      --blue-border: rgba(99,102,241,0.35);
      --blue-text: #c7d2fe;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button, input, select, textarea { font: inherit; }

    .app {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      padding: 10px 10px 22px;
    }

    .stack { display: grid; gap: 10px; }

    .hero h1 {
      margin: 0;
      font-size: 1.7rem;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .button, .icon-btn, .pill-btn {
      border: 1px solid transparent;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .button {
      width: 100%;
      height: 44px;
      border-radius: 16px;
      background: var(--accent);
      color: var(--accent-text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 700;
    }

    .button.secondary {
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-color: var(--border);
      font-weight: 600;
    }

    .panel {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted-2);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .field, .select, .textarea {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      min-height: 40px;
      padding: 0 12px;
      outline: none;
    }

    .field::placeholder, .textarea::placeholder { color: var(--muted-2); }
    .field.search { padding-left: 38px; }

    .textarea {
      min-height: 74px;
      padding: 10px 12px;
      resize: vertical;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .cards {
      display: grid;
      gap: 10px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .card-title {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.05;
      letter-spacing: -0.03em;
      word-break: break-word;
      text-transform: capitalize;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 0.68rem;
      line-height: 1;
      border: 0;
      white-space: nowrap;
    }

    .badge.category {
      background: rgba(255,255,255,0.10);
      color: #e2e8f0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .badge.total {
      background: rgba(99,102,241,0.15);
      color: var(--blue-text);
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: transparent;
      color: #cbd5e1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
    }

    .icon-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .icon-btn.danger:hover { background: rgba(239,68,68,0.14); color: #fecaca; }

    .qty-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .qty-card {
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      padding: 9px;
      min-width: 0;
    }

    .qty-card.highlight {
      background: var(--blue-soft);
      border-color: var(--blue-border);
    }

    .qty-head {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #e2e8f0;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .qty-head svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .qty-controls {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .qty-number {
      min-width: 22px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .pill-btn {
      width: 30px;
      height: 30px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .pill-btn:hover { background: rgba(255,255,255,0.10); }

    .notes {
      margin-top: 10px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      padding: 10px;
    }

    .notes-label {
      color: var(--muted-2);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .notes-text {
      color: #cbd5e1;
      font-size: 0.82rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty {
      text-align: center;
      padding: 28px 14px;
      color: var(--muted);
    }

    .empty h3 {
      margin: 8px 0 0;
      color: #fff;
      font-size: 1rem;
    }

    .empty p { margin: 6px 0 0; font-size: 0.86rem; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: 100%;
      max-width: 430px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 16px;
      max-height: 92vh;
      overflow: auto;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .close-btn {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: #fff;
      cursor: pointer;
    }

    .form-grid { display: grid; gap: 10px; }
    .form-row { display: grid; gap: 6px; }
    .form-two { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    label {
      font-size: 0.84rem;
      color: #e2e8f0;
      font-weight: 600;
    }

    .hidden { display: none !important; }

    @media (min-width: 700px) {
      .app {
        max-width: 980px;
        padding: 20px 18px 32px;
      }

      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card-title {
        font-size: 1.5rem;
      }

      .qty-card {
        padding: 12px;
      }

      .qty-head {
        font-size: 0.78rem;
      }

      .qty-head svg {
        width: 18px;
        height: 18px;
      }

      .qty-number {
        font-size: 1.6rem;
      }

      .pill-btn {
        width: 38px;
        height: 38px;
        font-size: 1.2rem;
      }

      .modal {
        max-width: 520px;
      }
    }
  </style>
</head>
<body>
  <div class="app stack">
    <section class="hero">
      <h1>Il negozio 🛍️</h1>
      <p>Tieni sotto controllo le scorte tra casa e cantina.</p>
    </section>

    <button class="button" id="openAddBtn">
      <span>＋</span>
      <span>Nuovo prodotto</span>
    </button>

    <section class="panel stack">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input id="searchInput" class="field search" placeholder="Cerca prodotto, categoria, note..." />
      </div>

      <div class="filters-grid">
        <select id="categoryFilter" class="select">
          <option value="tutte">Tutte le categorie</option>
        </select>
        <select id="locationFilter" class="select">
          <option value="tutte">Tutti i luoghi</option>
          <option value="Casa">Casa</option>
          <option value="Cantina">Cantina</option>
        </select>
      </div>

      <button class="button secondary" id="clearFiltersBtn">
        <span>↺</span>
        <span>Svuota filtri</span>
      </button>
    </section>

    <section id="cards" class="cards"></section>

    <section id="emptyState" class="panel empty hidden">
      <div style="font-size: 2rem;">📦</div>
      <h3>Nessun prodotto trovato</h3>
      <p>Prova a cambiare i filtri o aggiungi un nuovo articolo.</p>
    </section>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle">Nuovo prodotto</h2>
        <button class="close-btn" id="closeModalBtn" aria-label="Chiudi">✕</button>
      </div>

      <div class="form-grid">
        <div class="form-row">
          <label for="nameInput">Nome prodotto</label>
          <input id="nameInput" class="field" placeholder="Es. crema corpo vaniglia" />
        </div>

        <div class="form-row">
          <label for="categoryInput">Categoria</label>
          <select id="categoryInput" class="select"></select>
        </div>

        <div class="form-two">
          <div class="form-row">
            <label for="casaInput">Casa</label>
            <input id="casaInput" class="field" type="number" min="0" inputmode="numeric" />
          </div>
          <div class="form-row">
            <label for="cantinaInput">Cantina</label>
            <input id="cantinaInput" class="field" type="number" min="0" inputmode="numeric" />
          </div>
        </div>

        <div class="form-row">
          <label for="notesInput">Note</label>
          <textarea id="notesInput" class="textarea" placeholder="Marca, profumo, dettagli..."></textarea>
        </div>

        <button class="button" id="saveBtn">Salva prodotto</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'il-negozio-scorte-html-v2';
    const categories = ['Cura corpo', 'Detergenti', 'Alimenti', 'Altro'];

    const initialItems = [
      {
        id: crypto.randomUUID(),
        name: 'Crema corpo',
        category: 'Cura corpo',
        casa: 2,
        cantina: 10,
        notes: 'Vari marchi e fragranze',
      },
      {
        id: crypto.randomUUID(),
        name: 'Sapone solido',
        category: 'Cura corpo',
        casa: 1,
        cantina: 7,
        notes: 'Doppioni e scorte regalo',
      },
      {
        id: crypto.randomUUID(),
        name: 'Spray pulizia bagno',
        category: 'Detergenti',
        casa: 2,
        cantina: 1,
        notes: 'Uno aperto, due chiusi',
      },
    ];

    let items = loadItems();
    let query = '';
    let categoryFilter = 'tutte';
    let locationFilter = 'tutte';
    let editingId = null;

    const cardsEl = document.getElementById('cards');
    const emptyStateEl = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');
    const categoryFilterEl = document.getElementById('categoryFilter');
    const locationFilterEl = document.getElementById('locationFilter');
    const clearFiltersBtn = document.getElementById('clearFiltersBtn');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalTitle = document.getElementById('modalTitle');
    const openAddBtn = document.getElementById('openAddBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const saveBtn = document.getElementById('saveBtn');
    const nameInput = document.getElementById('nameInput');
    const categoryInput = document.getElementById('categoryInput');
    const casaInput = document.getElementById('casaInput');
    const cantinaInput = document.getElementById('cantinaInput');
    const notesInput = document.getElementById('notesInput');

    fillCategorySelects();
    bindEvents();
    render();

    function loadItems() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return initialItems;
        const parsed = JSON.parse(saved);
        if (!Array.isArray(parsed)) return initialItems;

        return parsed.map((item) => {
          if (typeof item.casa === 'number' && typeof item.cantina === 'number') {
            return {
              id: item.id || crypto.randomUUID(),
              name: item.name || 'Prodotto',
              category: item.category || 'Altro',
              casa: Math.max(0, item.casa),
              cantina: Math.max(0, item.cantina),
              notes: item.notes || '',
            };
          }

          const quantity = Number(item.quantity || 0);
          const legacyLocation = item.location || 'Cantina';
          return {
            id: item.id || crypto.randomUUID(),
            name: item.name || 'Prodotto',
            category: item.category || 'Altro',
            casa: legacyLocation === 'Casa' ? quantity : 0,
            cantina: legacyLocation === 'Cantina' ? quantity : 0,
            notes: item.notes || '',
          };
        });
      } catch {
        return initialItems;
      }
    }

    function saveItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function fillCategorySelects() {
      categories.forEach((category) => {
        const option1 = document.createElement('option');
        option1.value = category;
        option1.textContent = category;
        categoryFilterEl.appendChild(option1);

        const option2 = document.createElement('option');
        option2.value = category;
        option2.textContent = category;
        categoryInput.appendChild(option2);
      });
    }

    function bindEvents() {
      searchInput.addEventListener('input', (e) => {
        query = e.target.value.trim().toLowerCase();
        render();
      });

      categoryFilterEl.addEventListener('change', (e) => {
        categoryFilter = e.target.value;
        render();
      });

      locationFilterEl.addEventListener('change', (e) => {
        locationFilter = e.target.value;
        render();
      });

      clearFiltersBtn.addEventListener('click', () => {
        query = '';
        categoryFilter = 'tutte';
        locationFilter = 'tutte';
        searchInput.value = '';
        categoryFilterEl.value = 'tutte';
        locationFilterEl.value = 'tutte';
        render();
      });

      openAddBtn.addEventListener('click', () => openModal());
      closeModalBtn.addEventListener('click', closeModal);
      modalBackdrop.addEventListener('click', (e) => {
        if (e.target === modalBackdrop) closeModal();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modalBackdrop.classList.contains('open')) closeModal();
      });

      saveBtn.addEventListener('click', saveForm);
    }

    function openModal(item = null) {
      editingId = item ? item.id : null;
      modalTitle.textContent = item ? 'Modifica prodotto' : 'Nuovo prodotto';
      saveBtn.textContent = item ? 'Salva modifiche' : 'Salva prodotto';

      nameInput.value = item?.name || '';
      categoryInput.value = item?.category || 'Altro';
      casaInput.value = item?.casa ?? 0;
      cantinaInput.value = item?.cantina ?? 1;
      notesInput.value = item?.notes || '';

      modalBackdrop.classList.add('open');
      modalBackdrop.setAttribute('aria-hidden', 'false');
      setTimeout(() => nameInput.focus(), 10);
    }

    function closeModal() {
      editingId = null;
      modalBackdrop.classList.remove('open');
      modalBackdrop.setAttribute('aria-hidden', 'true');
    }

    function saveForm() {
      const name = nameInput.value.trim();
      if (!name) {
        alert('Inserisci il nome del prodotto.');
        nameInput.focus();
        return;
      }

      const payload = {
        id: editingId || crypto.randomUUID(),
        name,
        category: categoryInput.value || 'Altro',
        casa: Math.max(0, Number(casaInput.value || 0)),
        cantina: Math.max(0, Number(cantinaInput.value || 0)),
        notes: notesInput.value.trim(),
      };

      if (editingId) {
        items = items.map((item) => item.id === editingId ? payload : item);
      } else {
        items = [payload, ...items];
      }

      saveItems();
      closeModal();
      render();
    }

    function getFilteredItems() {
      return items
        .filter((item) => {
          const haystack = [item.name, item.category, item.notes].join(' ').toLowerCase();
          const hasCasa = item.casa > 0;
          const hasCantina = item.cantina > 0;
          const matchQuery = haystack.includes(query);
          const matchCategory = categoryFilter === 'tutte' || item.category === categoryFilter;
          const matchLocation =
            locationFilter === 'tutte' ||
            (locationFilter === 'Casa' && hasCasa) ||
            (locationFilter === 'Cantina' && hasCantina);

          return matchQuery && matchCategory && matchLocation;
        })
        .sort((a, b) => a.name.localeCompare(b.name, 'it', { sensitivity: 'base' }));
    }

    function changeQuantity(id, field, delta) {
      items = items.map((item) => {
        if (item.id !== id) return item;
        return {
          ...item,
          [field]: Math.max(0, Number(item[field] || 0) + delta),
        };
      });
      saveItems();
      render();
    }

    function deleteItem(id) {
      const confirmed = window.confirm('Vuoi davvero eliminare questo prodotto?');
      if (!confirmed) return;
      items = items.filter((item) => item.id !== id);
      saveItems();
      render();
    }

    function icon(type) {
      if (type === 'home') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"></path><path d="M5 9.5V21h14V9.5"></path></svg>';
      if (type === 'warehouse') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 4l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"></path><path d="M8 21v-7h8v7"></path></svg>';
      if (type === 'edit') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>';
      if (type === 'trash') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path></svg>';
      return '';
    }

    function render() {
      const filtered = getFilteredItems();
      cardsEl.innerHTML = '';
      emptyStateEl.classList.toggle('hidden', filtered.length > 0);

      filtered.forEach((item) => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-top">
            <div style="min-width:0;">
              <h3 class="card-title">${escapeHtml(item.name)}</h3>
              <div class="badges">
                <span class="badge category">${escapeHtml(item.category)}</span>
                <span class="badge total">Totale ${item.casa + item.cantina}</span>
              </div>
            </div>
            <div class="actions">
              <button class="icon-btn" data-action="edit" data-id="${item.id}" aria-label="Modifica">${icon('edit')}</button>
              <button class="icon-btn danger" data-action="delete" data-id="${item.id}" aria-label="Elimina">${icon('trash')}</button>
            </div>
          </div>

          <div class="qty-grid">
            <div class="qty-card ${item.casa >= item.cantina ? 'highlight' : ''}">
              <div class="qty-head">${icon('home')}<span>Casa</span></div>
              <div class="qty-controls">
                <button class="pill-btn" data-action="minus" data-field="casa" data-id="${item.id}" aria-label="Diminuisci casa">−</button>
                <div class="qty-number">${item.casa}</div>
                <button class="pill-btn" data-action="plus" data-field="casa" data-id="${item.id}" aria-label="Aumenta casa">＋</button>
              </div>
            </div>

            <div class="qty-card">
              <div class="qty-head">${icon('warehouse')}<span>Cantina</span></div>
              <div class="qty-controls">
                <button class="pill-btn" data-action="minus" data-field="cantina" data-id="${item.id}" aria-label="Diminuisci cantina">−</button>
                <div class="qty-number">${item.cantina}</div>
                <button class="pill-btn" data-action="plus" data-field="cantina" data-id="${item.id}" aria-label="Aumenta cantina">＋</button>
              </div>
            </div>
          </div>

          ${item.notes ? `
            <div class="notes">
              <div class="notes-label">Note</div>
              <div class="notes-text">${escapeHtml(item.notes)}</div>
            </div>
          ` : ''}
        `;
        cardsEl.appendChild(card);
      });

      cardsEl.querySelectorAll('[data-action]').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          const action = e.currentTarget.dataset.action;
          const id = e.currentTarget.dataset.id;
          const field = e.currentTarget.dataset.field;
          const item = items.find((x) => x.id === id);

          if (action === 'edit' && item) openModal(item);
          if (action === 'delete') deleteItem(id);
          if (action === 'minus') changeQuantity(id, field, -1);
          if (action === 'plus') changeQuantity(id, field, 1);
        });
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
